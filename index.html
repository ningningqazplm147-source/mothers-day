<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>亲爱的妈沫儿~母亲节快乐</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    overflow-x:hidden;
    font-family:"Microsoft YaHei",sans-serif;
    background:
    radial-gradient(circle at top,#ffe3ec 0%,#ffd4e3 35%,#ffc2d6 70%,#ffb3cb 100%);
    min-height:100vh;
    color:#fff;
}

/* 星空背景 */
.stars{
    position:fixed;
    width:100%;
    height:100%;
    z-index:1;
    pointer-events:none;
}

.star{
    position:absolute;
    width:3px;
    height:3px;
    background:white;
    border-radius:50%;
    animation:twinkle 3s infinite;
}

@keyframes twinkle{
    0%,100%{opacity:.2;}
    50%{opacity:1;}
}

/* 飘落装饰 */
.floating{
    position:fixed;
    top:-10vh;
    z-index:30;
    pointer-events:none;
    animation:fall linear forwards;
}

@keyframes fall{
    to{
        transform:translateY(120vh) rotate(360deg);
        opacity:0;
    }
}

/* 主容器 */
.container{
    position:relative;
    z-index:10;
    width:100%;
    display:flex;
    justify-content:center;
    padding:40px 20px;
}

/* 卡片 */
.card{
    width:100%;
    max-width:900px;
    background:rgba(255,255,255,0.18);
    backdrop-filter:blur(14px);
    border-radius:35px;
    padding:50px 35px;
    text-align:center;
    box-shadow:0 10px 40px rgba(0,0,0,.15);
    position:relative;
    overflow:hidden;
}

.title{
    font-size:58px;
    font-weight:bold;
    line-height:1.3;
    margin-top:10px;
    text-shadow:0 5px 10px rgba(0,0,0,.12);
}

.subtitle{
    margin-top:20px;
    font-size:24px;
    opacity:.95;
}

.message{
    margin-top:35px;
    font-size:24px;
    line-height:2;
    white-space:pre-line;
}

/* 信封区域 */
.envelope-wrap{
    display:flex;
    justify-content:center;
    margin:50px 0 20px;
    position:relative;
    z-index:20;
}

.envelope{
    position:relative;
    width:260px;
    height:180px;
    cursor:pointer;
}

/* 信封主体 */
.envelope-body{
    position:absolute;
    width:100%;
    height:100%;
    background:#f58ab0;
    border-radius:12px;
    z-index:2;
}

/* 信封盖 */
.envelope-top{
    position:absolute;
    width:100%;
    height:120px;
    background:#ff74a5;
    clip-path:polygon(0 100%,50% 0,100% 100%);
    transform-origin:top;
    transition:1s;
    z-index:4;
}

/* 信件 */
.letter{
    position:absolute;
    width:88%;
    left:6%;
    top:20px;
    background:white;
    color:#ff5a92;
    border-radius:16px;
    padding:25px 20px;
    font-size:18px;
    line-height:1.8;
    text-align:left;
    transition:1s;
    z-index:1;
    box-shadow:0 8px 25px rgba(0,0,0,.15);
}

/* 打开状态 */
.envelope.open .envelope-top{
    transform:rotateX(180deg);
}

.envelope.open .letter{
    transform:translateY(-170px);
    z-index:10;
}

/* 按钮 */
.btn-group{
    margin-top:30px;
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:20px;
}

.btn{
    border:none;
    padding:16px 34px;
    border-radius:999px;
    font-size:18px;
    cursor:pointer;
    font-weight:bold;
    transition:.3s;
}

.primary{
    background:white;
    color:#ff4f87;
}

.secondary{
    background:rgba(255,255,255,.2);
    border:1px solid rgba(255,255,255,.4);
    color:white;
}

.btn:hover{
    transform:translateY(-4px) scale(1.05);
}

/* 轮播 */
.slider{
    width:100%;
    max-width:720px;
    margin:50px auto 0;
    position:relative;
    overflow:hidden;
    border-radius:28px;
    z-index:10;
    box-shadow:0 10px 30px rgba(0,0,0,.2);
    background:white;
    padding:8px;
}

.slides{
    display:flex;
    transition:1s;
}

.slide{
    min-width:100%;
    height:450px;
    overflow:hidden;
    border-radius:20px;
}

.slide img{
    width:100%;
    height:100%;
    object-fit:contain;
    background:#fff;
}

/* footer */
.footer{
    margin-top:45px;
    font-size:18px;
}

/* 烟花 */
.firework{
    position:fixed;
    z-index:9999;
    pointer-events:none;
    font-size:28px;
    transition:1.5s;
}

/* 点击爱心 */
.spark{
    position:fixed;
    z-index:9999;
    pointer-events:none;
    animation:sparkMove 1s forwards;
}

@keyframes sparkMove{
    to{
        transform:translateY(-80px) scale(1.5);
        opacity:0;
    }
}

/* 手机 */
@media(max-width:768px){

    .card{
        padding:35px 22px;
    }

    .title{
        font-size:38px;
    }

    .subtitle{
        font-size:18px;
    }

    .message{
        font-size:18px;
    }

    .slide{
        height:320px;
    }

    .envelope{
        transform:scale(.9);
    }

}
</style>
</head>

<body>

<div class="stars" id="stars"></div>

<div class="container">

<div class="card">

<div style="font-size:60px;">🌸</div>

<div class="title">
全世界最好的妈沫儿~母亲节快乐
</div>

<div class="subtitle">
Mother's Day · 永远爱您
</div>

<div class="message">
从前，总是不懂事惹您生气。

谢谢您一直以来的付出、
包容与温柔。

谢谢您一直陪着我，
支持我，
照顾我。

希望未来的日子里，
您能够多一点轻松，
多一点快乐。

妈妈，我永远爱您 ❤️
</div>

<!-- 信封 -->
<div class="envelope-wrap">

<div class="envelope" id="envelope" onclick="openEnvelope()">

<div class="letter">
亲爱的妈妈：

谢谢您一直以来的爱与照顾。

愿您永远健康快乐，
每天都能开开心心。

母亲节快乐 ❤️
</div>

<div class="envelope-top"></div>

<div class="envelope-body"></div>

</div>

</div>

<!-- 按钮 -->
<div class="btn-group">

<button class="btn primary" onclick="showLove()">
点我收下祝福 💖
</button>

<button class="btn secondary" onclick="releaseHearts()">
放烟花 ✨
</button>

</div>

<!-- 轮播 -->
<div class="slider">

<div class="slides" id="slides">

<div class="slide">
<img src="mom1.jpg">
</div>

<div class="slide">
<img src="mom2.jpg">
</div>

<div class="slide">
<img src="mom3.jpg">
</div>

</div>

</div>

<div class="footer">
❤️ 愿岁月温柔以待，愿您永远平安健康、幸福快乐 ❤️
</div>

</div>
</div>

<!-- 音乐 -->
<audio id="bgm" loop>
<source src="music.mp3" type="audio/mpeg">
</audio>

<script>

/* 微信点击播放音乐 */
document.body.addEventListener("click",function(){

    const music=document.getElementById("bgm");

    music.play();

},{once:true});

/* 打开信封 */
function openEnvelope(){

    document.getElementById("envelope").classList.toggle("open");
}

/* 星空 */
for(let i=0;i<80;i++){

    const star=document.createElement("div");

    star.className="star";

    star.style.left=Math.random()*100+"vw";
    star.style.top=Math.random()*100+"vh";

    star.style.animationDelay=Math.random()*3+"s";

    document.getElementById("stars").appendChild(star);
}

/* 飘落装饰 */
function createFloating(){

    const el=document.createElement("div");

    el.className="floating";

    const arr=["💖","🌸","✨","💕"];

    el.innerHTML=arr[Math.floor(Math.random()*arr.length)];

    el.style.left=Math.random()*100+"vw";

    el.style.fontSize=(20+Math.random()*20)+"px";

    el.style.animationDuration=(6+Math.random()*5)+"s";

    document.body.appendChild(el);

    setTimeout(()=>{
        el.remove();
    },12000);
}

setInterval(createFloating,500);

/* 祝福 */
function showLove(){

    const arr=[
        "妈妈辛苦啦 ❤️",
        "永远爱您 💖",
        "愿您天天开心 🌸",
        "您是世界上最温柔的人 ✨"
    ];

    alert(arr[Math.floor(Math.random()*arr.length)]);
}

/* 烟花 */
function releaseHearts(){

    for(let i=0;i<50;i++){

        setTimeout(()=>{

            const heart=document.createElement("div");

            heart.className="firework";

            const arr=["💖","✨","💕","🌸"];

            heart.innerHTML=arr[Math.floor(Math.random()*arr.length)];

            heart.style.left="50%";
            heart.style.top="50%";

            const x=(Math.random()-0.5)*900;
            const y=(Math.random()-0.5)*700;

            document.body.appendChild(heart);

            setTimeout(()=>{
                heart.style.transform=`translate(${x}px,${y}px) scale(1.8)`;
                heart.style.opacity="0";
            },20);

            setTimeout(()=>{
                heart.remove();
            },1600);

        },i*35);
    }
}

/* 点击爱心 */
document.addEventListener("click",(e)=>{

    const spark=document.createElement("div");

    spark.className="spark";

    spark.innerHTML="💗";

    spark.style.left=e.pageX+"px";
    spark.style.top=e.pageY+"px";

    spark.style.fontSize="28px";

    document.body.appendChild(spark);

    setTimeout(()=>{
        spark.remove();
    },1000);

});

/* 轮播 */
let index=0;

setInterval(()=>{

    index++;

    if(index>2){
        index=0;
    }

    document.getElementById("slides").style.transform=
    `translateX(-${index*100}%)`;

},3000);

</script>

</body>
</html>
