<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>亲爱的妈沫儿~母亲节快乐</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    overflow-x:hidden;
    font-family:"Microsoft YaHei",sans-serif;
    background:
    radial-gradient(circle at top,#ffe3ec 0%,#ffd4e3 35%,#ffc2d6 70%,#ffb3cb 100%);
    min-height:100vh;
    color:#fff;
}

/* 星空背景 */

.stars{
    position:fixed;
    width:100%;
    height:100%;
    z-index:1;
}

.star{
    position:absolute;
    background:white;
    border-radius:50%;
    opacity:.8;
    animation:twinkle 3s infinite;
}

@keyframes twinkle{
    0%,100%{
        opacity:.2;
        transform:scale(1);
    }
    50%{
        opacity:1;
        transform:scale(1.6);
    }
}

/* 飘落装饰 */

.heart{
    position:fixed;
    top:-10vh;
    z-index:9999;
    pointer-events:none;
    animation:fall linear forwards;
}

@keyframes fall{
    to{
        transform:translateY(120vh) rotate(360deg);
        opacity:0;
    }
}

/* 主容器 */

.container{
    position:relative;
    z-index:10;
    width:100%;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:40px 20px;
}

/* 卡片 */

.card{
    width:100%;
    max-width:950px;
    padding:50px;
    border-radius:35px;

    background:rgba(255,255,255,0.15);

    backdrop-filter:blur(18px);

    box-shadow:
    0 8px 32px rgba(0,0,0,0.15),
    inset 0 0 20px rgba(255,255,255,0.2);

    text-align:center;

    position:relative;

    overflow:visible;

    animation:fadeUp 1.5s ease;
}

@keyframes fadeUp{
    from{
        opacity:0;
        transform:translateY(60px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

.title{
    font-size:58px;
    font-weight:bold;
    margin-bottom:20px;
    text-shadow:0 4px 10px rgba(0,0,0,0.15);
}

.subtitle{
    font-size:24px;
    margin-bottom:35px;
}

.message{
    font-size:24px;
    line-height:2;
    margin-bottom:35px;
}

/* 信封 */

.envelope-area{
    margin:35px auto;
    perspective:1000px;
}

.envelope{
    width:220px;
    height:140px;
    margin:auto;
    position:relative;
    cursor:pointer;
    transition:1s;
}

.envelope-top{
    position:absolute;
    width:100%;
    height:100%;
    background:#ff7aa8;
    clip-path:polygon(0 0,100% 0,50% 55%);
    transform-origin:top;
    transition:1s;
    z-index:3;
}

.envelope-body{
    position:absolute;
    width:100%;
    height:100%;
    background:#ff94b8;
    border-radius:0 0 12px 12px;
}

.letter{
    position:absolute;
    width:90%;
    height:120px;
    background:white;
    left:5%;
    top:10px;
    border-radius:12px;
    padding:15px;
    color:#ff5f92;
    font-size:15px;
    line-height:1.8;
    transition:1s;
    z-index:1;
}

.envelope.open .envelope-top{
    transform:rotateX(180deg);
}

.envelope.open .letter{
    transform:translateY(-100px);
}

/* 按钮 */

.btn-group{
    margin-top:35px;
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:20px;
}

.btn{
    border:none;
    padding:16px 34px;
    border-radius:999px;
    font-size:18px;
    cursor:pointer;
    transition:.3s;
    font-weight:bold;
}

.primary{
    background:white;
    color:#ff4f87;
}

.secondary{
    background:rgba(255,255,255,0.2);
    color:white;
    border:1px solid rgba(255,255,255,0.4);
}

.btn:hover{
    transform:translateY(-5px) scale(1.05);
}

/* 轮播相册 */

.slider{
    width:100%;
    overflow:hidden;
    margin-top:45px;
}

.slides{
    display:flex;
    width:300%;
    animation:slide 15s infinite;
}

.slide{
    width:100%;
    flex-shrink:0;
    padding:10px;
}

.slide img{
    width:100%;
    max-height:450px;
    object-fit:cover;
    border-radius:28px;
    border:8px solid rgba(255,255,255,.8);
    box-shadow:0 12px 25px rgba(0,0,0,.2);
}

@keyframes slide{

    0%{
        transform:translateX(0);
    }

    30%{
        transform:translateX(0);
    }

    35%{
        transform:translateX(-100%);
    }

    65%{
        transform:translateX(-100%);
    }

    70%{
        transform:translateX(-200%);
    }

    100%{
        transform:translateX(-200%);
    }

}

/* 底部 */

.footer{
    margin-top:40px;
    font-size:18px;
}

/* 点击爱心 */

.spark{
    position:fixed;
    pointer-events:none;
    z-index:99999;
    animation:sparkMove 1s forwards;
}

@keyframes sparkMove{
    to{
        transform:translateY(-80px) scale(1.5);
        opacity:0;
    }
}

/* 手机适配 */

@media(max-width:768px){

    .card{
        padding:35px 20px;
    }

    .title{
        font-size:38px;
    }

    .subtitle{
        font-size:18px;
    }

    .message{
        font-size:18px;
    }

    .slide img{
        max-height:320px;
    }

}

</style>
</head>

<body>

<div class="stars" id="stars"></div>

<div class="container">

<div class="card">

<div style="font-size:60px;">🌸</div>

<div class="title">
全世界最好的妈沫儿~母亲节快乐
</div>

<div class="subtitle">
Mother's Day · 永远爱您
</div>

<div class="message" id="typingText"></div>

<!-- 信封 -->

<div class="envelope-area">

<div class="envelope" id="envelope" onclick="openEnvelope()">

<div class="envelope-top"></div>

<div class="envelope-body"></div>

<div class="letter">
妈妈辛苦啦 ❤️<br>
愿您永远开心健康<br>
永远被爱包围 🌸
</div>

</div>

</div>

<!-- 按钮 -->

<div class="btn-group">

<button class="btn primary" onclick="showLove()">
点我收下祝福 💖
</button>

<button class="btn secondary" onclick="releaseHearts()">
放烟花 ✨
</button>

</div>

<!-- 轮播相册 -->

<div class="slider">

<div class="slides">

<div class="slide">
<img src="mom1.jpg">
</div>

<div class="slide">
<img src="mom2.jpg">
</div>

<div class="slide">
<img src="mom3.jpg">
</div>

</div>

</div>

<div class="footer">
❤️ 愿岁月温柔以待，愿您永远平安健康、幸福快乐 ❤️
</div>

</div>

</div>

<!-- 音乐 -->

<audio id="bgm" loop>
<source src="music.mp3" type="audio/mpeg">
</audio>

<script>

/* 点击播放音乐 */

document.body.addEventListener("click",function(){

    document.getElementById("bgm").play();

},{once:true});

/* 打字机 */

const text=`
从前，总是不懂事惹您生气。

谢谢您一直以来的付出、
包容与温柔。

谢谢您一直陪着我，
支持我，
照顾我。

希望未来的日子里，
您能够多一点轻松，
多一点快乐。

妈妈，我永远爱您 ❤️
`;

let i=0;

function typing(){

    if(i<text.length){

        document.getElementById("typingText").innerHTML+=text.charAt(i);

        i++;

        setTimeout(typing,60);
    }
}

typing();

/* 星空 */

for(let i=0;i<80;i++){

    const star=document.createElement("div");

    star.className="star";

    star.style.width=Math.random()*4+"px";
    star.style.height=star.style.width;

    star.style.left=Math.random()*100+"vw";
    star.style.top=Math.random()*100+"vh";

    star.style.animationDelay=Math.random()*3+"s";

    document.getElementById("stars").appendChild(star);
}

/* 飘落装饰 */

function createHeart(){

    const heart=document.createElement("div");

    heart.className="heart";

    const arr=["💖","💕","🌸","✨","❤️"];

    heart.innerHTML=arr[Math.floor(Math.random()*arr.length)];

    heart.style.left=Math.random()*100+"vw";

    heart.style.fontSize=(20+Math.random()*30)+"px";

    heart.style.animationDuration=(5+Math.random()*5)+"s";

    document.body.appendChild(heart);

    setTimeout(()=>{
        heart.remove();
    },10000);
}

setInterval(createHeart,400);

/* 祝福 */

function showLove(){

    const messages=[
        "妈妈辛苦啦 ❤️",
        "愿您天天开心 🌸",
        "永远爱您 💖",
        "您是世界上最温柔的人 ✨"
    ];

    alert(messages[Math.floor(Math.random()*messages.length)]);
}

/* 烟花 */

function releaseHearts(){

    for(let i=0;i<60;i++){

        setTimeout(()=>{

            const heart=document.createElement("div");

            heart.innerHTML=["💖","✨","💕","🌸","❤️"][Math.floor(Math.random()*5)];

            heart.style.position="fixed";

            heart.style.left="50%";
            heart.style.top="50%";

            heart.style.fontSize=(20+Math.random()*40)+"px";

            heart.style.pointerEvents="none";

            heart.style.zIndex="99999";

            const x=(Math.random()-0.5)*1200;
            const y=(Math.random()-0.5)*1200;

            heart.style.transition="1.5s";

            document.body.appendChild(heart);

            setTimeout(()=>{

                heart.style.transform=`translate(${x}px,${y}px)`;

                heart.style.opacity="0";

            },10);

            setTimeout(()=>{
                heart.remove();
            },1600);

        },i*30);

    }

}

/* 点击爱心 */

document.addEventListener("click",(e)=>{

    const spark=document.createElement("div");

    spark.className="spark";

    spark.innerHTML="💗";

    spark.style.left=e.pageX+"px";

    spark.style.top=e.pageY+"px";

    spark.style.fontSize="28px";

    document.body.appendChild(spark);

    setTimeout(()=>{
        spark.remove();
    },1000);

});

/* 信封展开 */

function openEnvelope(){

    document.getElementById("envelope").classList.toggle("open");

}

</script>

</body>
</html>
